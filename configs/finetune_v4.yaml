# AnyMALv4 Stage 2A: Direct Calibration Configuration

defaults:
  - base

stage: 2
stage_name: "direct_calibration_v4"

model:
  architecture: "anymal_v4"
  llm_model_name: "./checkpoints/llama3-8b-instruct"
  use_qlora: true
  lora_r: 64
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_flash_attention: true
  gradient_checkpointing: true

  vision_encoder_type: "siglip2"
  vision_model_name: "google/siglip2-so400m-patch14-384"
  connector_type: "spatial_perceiver_resampler"
  num_global_image_tokens: 64
  num_local_image_tokens: 64
  num_image_tokens: 128
  connector_layers: 3
  connector_heads: 8
  connector_ff_mult: 2
  connector_hidden_dim: 1024
  connector_output_scale: 1.0
  connector_output_gate_init: 0.0001
  use_2d_position_features: true
  project_directly_to_llm_dim: false

data:
  train_data_path: null
  image_dir: "./data/coco/train2017"
  eval_data_path: null
  filter_to_available_images: true
  image_size: 384
  max_length: 1536
  image_token_policy: "fixed"
  per_device_batch_size: 6
  gradient_accumulation_steps: 2
  dataloader_num_workers: 4
  pin_memory: true
  mixture:
    enabled: true
    strategy: "weighted"
    datasets:
      - name: "vqa_train_yes_no"
        weight: 0.45
        data_path: "./data/vqa_train_direct_yes_no.json"
        image_dir: "./data/coco/train2014"
        system_prompt: "Answer the image question directly and briefly. End after the answer."
      - name: "vqa_train_number"
        weight: 0.25
        data_path: "./data/vqa_train_direct_number.json"
        image_dir: "./data/coco/train2014"
        system_prompt: "Answer the image question directly and briefly. End after the answer."
      - name: "coco_object_count_color_direct"
        weight: 0.20
        data_path: "./data/coco_object_count_color_direct.json"
        image_dir: "./data/coco/train2017"
        system_prompt: "Answer the image question directly and briefly. End after the answer."
      - name: "vqa_train_other"
        weight: 0.05
        data_path: "./data/vqa_train_direct_other.json"
        image_dir: "./data/coco/train2014"
        system_prompt: "Answer the image question directly and briefly. End after the answer."
      - name: "short_llava_mix"
        weight: 0.05
        data_path: "./data/llava_short_answer_mix.json"
        image_dir: "./data/coco/train2017"
        system_prompt: "Answer the image question directly and briefly. End after the answer."

training:
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_steps: 100
  num_epochs: null
  train_projector_only: false
  train_adapter: false
  projector_warmup_steps: 0
  loss_scale: 0.03
  use_amp: true
  amp_dtype: "bfloat16"
  seed: 42

checkpoint:
  pretrain_checkpoint: "./outputs/pretrain_v4_grounding/checkpoint-10000"
  load_projector: true
  load_lora: false

logging:
  logging_steps: 50
  use_wandb: true
  wandb_project: "anymal-finetune-v4"
  wandb_run_name: "stage2a-v4-spatial-direct-calibration-lora-only-100"

checkpointing:
  save_steps: 50
  save_total_limit: 3
  output_dir: "./outputs/finetune_v4"

evaluation:
  eval_steps: null
  eval_strategy: "no"
