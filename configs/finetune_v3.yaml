# AnyMALv3 Stage 2: Grounded Instruction Tuning Configuration

defaults:
  - base

stage: 2
stage_name: "instruction_tuning_v3"

model:
  architecture: "anymal_v3"
  llm_model_name: "./checkpoints/llama3-8b-instruct"
  use_qlora: true
  lora_r: 64
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_flash_attention: true
  gradient_checkpointing: true

  vision_encoder_type: "siglip2"
  vision_model_name: "google/siglip2-so400m-patch14-384"
  connector_type: "perceiver_resampler"
  num_image_tokens: 128
  connector_layers: 6
  connector_heads: 16
  connector_ff_mult: 4
  project_directly_to_llm_dim: true

data:
  train_data_path: "./data/llava_instruct_150k.json"
  image_dir: "./data/coco/train2017"
  eval_data_path: null
  filter_to_available_images: true
  image_size: 384
  max_length: 1536
  image_token_policy: "fixed"
  per_device_batch_size: 6
  gradient_accumulation_steps: 2
  dataloader_num_workers: 4
  pin_memory: true
  mixture:
    enabled: true
    strategy: "weighted"
    datasets:
      - name: "vqa_train_direct"
        weight: 0.30
        data_path: "./data/vqa_train_direct_answers.json"
        image_dir: "./data/coco/train2014"
      - name: "coco_object_count_color_direct"
        weight: 0.20
        data_path: "./data/coco_object_count_color_direct.json"
        image_dir: "./data/coco/train2017"
      - name: "short_llava_mix"
        weight: 0.20
        data_path: "./data/llava_short_answer_mix.json"
        image_dir: "./data/coco/train2017"
      - name: "llava_instruct_general"
        weight: 0.20
        data_path: "./data/llava_instruct_150k.json"
        image_dir: "./data/coco/train2017"
      - name: "caption_long_form"
        weight: 0.10
        data_path: "./data/LLaVA-Pretrain/blip_laion_cc_sbu_558k.json"
        image_dir: "./data/LLaVA-Pretrain/images"

training:
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_steps: 3000
  num_epochs: null
  train_projector_only: false
  projector_warmup_steps: 0
  use_amp: true
  amp_dtype: "bfloat16"
  seed: 42

checkpoint:
  pretrain_checkpoint: "./outputs/pretrain_v3_grounding/checkpoint-10000"
  load_projector: true
  load_lora: false

logging:
  logging_steps: 50
  use_wandb: true
  wandb_project: "anymal-finetune-v3"
  wandb_run_name: "stage2-v3-grounded-instruction"

checkpointing:
  save_steps: 500
  save_total_limit: 3
  output_dir: "./outputs/finetune_v3"

evaluation:
  eval_steps: null
  eval_strategy: "no"
