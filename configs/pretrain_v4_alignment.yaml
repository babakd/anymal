# AnyMALv4 Stage 1A: Caption Alignment Configuration

defaults:
  - base

stage: 1
stage_name: "caption_alignment_v4"

model:
  architecture: "anymal_v4"
  llm_model_name: "./checkpoints/llama3-8b-instruct"
  use_qlora: false
  use_flash_attention: true
  gradient_checkpointing: true

  vision_encoder_type: "siglip2"
  vision_model_name: "google/siglip2-so400m-patch14-384"
  connector_type: "spatial_perceiver_resampler"
  num_global_image_tokens: 64
  num_local_image_tokens: 64
  num_image_tokens: 128
  connector_layers: 3
  connector_heads: 8
  connector_ff_mult: 2
  connector_hidden_dim: 1024
  connector_output_scale: 1.0
  connector_output_gate_init: 0.01
  use_2d_position_features: true
  project_directly_to_llm_dim: false

data:
  dataset_type: "llava_pretrain_caption"
  train_data_path: "./data/LLaVA-Pretrain/blip_laion_cc_sbu_558k.json"
  image_dir: "./data/LLaVA-Pretrain/images"
  eval_data_path: null
  streaming: false
  caption_prompt: ""
  filter_to_available_images: true
  min_caption_chars: 3
  deduplicate_captions: true
  image_size: 384
  max_length: 512
  per_device_batch_size: 16
  gradient_accumulation_steps: 4
  dataloader_num_workers: 8
  pin_memory: true

training:
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_steps: 20000
  num_epochs: null
  train_projector_only: true
  connector_warmup_steps: 1000
  connector_warmup_trainable_prefixes:
    - "projector.output_proj"
    - "projector.output_gate_logit"
  use_amp: true
  amp_dtype: "bfloat16"
  seed: 42

logging:
  logging_steps: 100
  use_wandb: true
  wandb_project: "anymal-pretrain-v4"
  wandb_run_name: "stage1a-v4-spatial-bottleneck1024-output-warmup-caption-alignment"

checkpointing:
  save_steps: 2000
  save_total_limit: 5
  output_dir: "./outputs/pretrain_v4_alignment"

evaluation:
  eval_steps: null
  eval_strategy: "no"
